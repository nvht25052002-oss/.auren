kind = "slides"
previewPath = "/ai-platforms-slides/"
title = "AI Dev Platforms 2024–2026"
version = "1.0.0"
id = "artifacts/ai-platforms-slides"
router = "path"

[[integratedSkills]]
name = "slides"
